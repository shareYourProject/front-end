<h4>view-object-table works!</h4>
<button class="btn btn-success"
              (click)="getListArgument(files)">Test</button>
<table class="table table-dark table-hover table-borderless">
    <thead>
      <tr>
        <th *ngFor="let header of headers">{{header}}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let file of files">
        <td>{{ file.name }}</td>
        <td>{{ file.dateModification | date: 'short'}}</td>
        <td>{{ file.lastUser }}</td>
      </tr>
    </tbody>
</table>
