<h4>view-object-table works!</h4>
<table class="table table-dark table-hover table-borderless">
    <thead>
        <tr>
            <th *ngFor="let key of keys">{{key}}</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let o of list">
            <td *ngFor="let k of keys">{{o[k]}}</td>
        </tr>
    </tbody>
</table>
