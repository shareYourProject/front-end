<div class="card mb-3 shadow-sm">
    <div class="card-body p-2">
        <div class="media">
            <img [src]="'https://picsum.photos/id/' + post.project.id + '/150/150'" class="align-self-start mr-3 img-thumbnail" alt="logo">
            <div class="media-body">
                <h5 class="my-0"><span class="font-weight-bold">{{ post.author.firstname}} {{ post.author.lastname}}</span> pour <span class="font-weight-lighter"><a [href]="'/project/' + post.project.id">{{ post.project.name}}</a></span></h5>
                <small class="text-muted"></small>
                <p class="mt-2">{{ post.content }}</p>
            </div>
        </div>
    </div>
    <div class="card-footer p-1">
        <div class="row">
            <div class="col" *ngIf="me">
                <button #like_btn type="button" class="btn btn-sm btn-block" (click)="likeButtonClick(like_btn)" [ngClass]="{'btn-outline-primary': !isLiked(), 'btn-primary': isLiked()}">
          <i class="feather-16" data-feather="thumbs-up">Like</i>
        </button>
            </div>
            <div class="col">
                <button type="button" class="btn btn-outline-secondary btn-sm btn-block" [routerLink]="'/post/' + post.id">
          <i class="feather-16" data-feather="message-circle">Comment</i>
        </button>
            </div>
        </div>
    </div>
</div>
