<div class="card mb-2">

        </div>
        <div class="col-md-10">
            <div class="card-body">
                <h5 class="card-title"><a [routerLink]="'/project/' + project.id">{{project.name}}</a></h5>
                <p class="card-text">{{project.description}}</p>
            </div>
        </div>
    </div>
</div>
