<div class="card">
    <div class="row no-gutters">
        <div class="col-md-1 ml-3 d-flex justify-content-center align-items-center">
            <img src="https://avatars0.githubusercontent.com/u/62944241?s=400&u=359d3273d61f46a45c264cde695baed9cb0ef593&v=4" width="64" height="64" alt="...">
        </div>
        <div class="col-md-10">
            <div class="card-body">
                <div class="card-title">
                    <h5 class="d-inline mr-3"><a [routerLink]="'/user/' + user.id">{{user.username}}</a></h5>
                    <app-skills-list [user]="user"></app-skills-list>
                </div>
                <p class="card-text">{{user.biography}}</p>
            </div>
        </div>
    </div>
</div>
