<div class="container rounded">
    <div *ngIf="(members$ | async) as members; else loading">
        <div *ngFor="let member of members">
            <img [src]="member.profilePictureUrl"><span><a [href]="'/user/' + member.id">{{member.username}}</a></span>
        </div>
    </div>
    <ng-template #loading>
        Loading ...
    </ng-template>
</div>
