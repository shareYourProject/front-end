<div class="row mb-2" *ngFor="let user of users">
    <div class="card col-12">
        <div class="card-body d-flex align-items-start">
            <div class="col-auto">
                <img [src]="user.profilePictureUrl" width="50" height="50">
            </div>
            <div>
              <div class="d-flex col-auto"><h5 class="font-weight-bold">{{user.firstname}} {{user.lastname}} </h5><a [href]="'/user/' + user.id"><em>#{{user.username}}</em></a></div>
              <div class="col-auto">
                <p class="text-break">
                  {{user.biography}}
                </p>
              </div>
            </div>
        </div>
    </div>
</div>
