<div class="container rounded border p-2">
    <div class="row mb-2" *ngFor="let user of users">
        <div class="col-auto">
            <img [src]="user.profilePictureUrl" width="50" height="50">
        </div>
        <div class="col"><a [href]="'/user/' + user.id">{{user.username}}</a></div>
    </div>
</div>
